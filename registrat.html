<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MineralStore - Регистрация</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="square1 auth-container">
        <!-- Кнопка назад -->
        <img class="imgBack" src="https://cdn-icons-png.flaticon.com/512/93/93634.png" onclick="location.href='index.html'" style="width: 50px; height: 50px; cursor: pointer;">
        
        <!-- Сообщения об ошибках/успехе -->
        <div id="errorMessage" class="error-message" style="display: none;"></div>
        <div id="successMessage" class="success-message" style="display: none;"></div>
        
        <!-- Заголовок -->
        <h2 class="auth-title">Регистрация</h2>
        
        <!-- Форма регистрации -->
        <div class="auth-form">
            <div class="input-group">
                <label class="input-label">Почта</label>
                <input type="email" id="regEmail" class="auth-input" placeholder="Введите email">
            </div>
            
            <div class="input-group">
                <label class="input-label">Пароль</label>
                <input type="password" id="regPassword" class="auth-input" placeholder="Введите пароль">
            </div>
            
            <div class="password-hint">Минимум 6 символов</div>
            
            <button id="registerBtn" class="auth-button">
                Зарегистрироваться
            </button>
            
            <div class="auth-footer">
                Уже есть аккаунт? 
                <a href="vhod.html" class="auth-link">Войти</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('registerBtn').addEventListener('click', async function() {
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            
            await register(email, password);
        });
    </script>
</body>
</html>
