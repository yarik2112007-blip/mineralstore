<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MineralStore - Товар</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Дополнительные стили для страницы товара */
        .product-page {
            position: relative;
            width: 1000px;
            max-width: 95%;
            background: #40E0D0;
            border-radius: 20px;
            border: 4px solid #9614c9;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .back-to-catalog {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 20px;
            background: #9614c9;
            color: white;
            border: 2px solid white;
            border-radius: 25px;
            text-decoration: none;
            transition: 0.3s;
        }
        
        .back-to-catalog:hover {
            background: #40E0D0;
            transform: scale(1.05);
        }
        
        .product-detail {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        .product-detail-image {
            flex: 0 0 300px;
            text-align: center;
        }
        
        .product-detail-image img {
            width: 100%;
            max-width: 250px;
            border-radius: 20px;
            border: 4px solid white;
            box-shadow: 0 10px 25px rgba(150,20,201,0.3);
        }
        
        .product-detail-info {
            flex: 1;
        }
        
        .product-detail-name {
            font-size: 32px;
            color: #9614c9;
            margin-bottom: 15px;
            font-family: Snell Roundhand, cursive;
        }
        
        .product-detail-price {
            font-size: 28px;
            font-weight: bold;
            color: white;
            margin-bottom: 15px;
        }
        
        .product-detail-description {
            font-size: 16px;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        
        .product-detail-stock {
            margin-bottom: 20px;
            color: white;
        }
        
        .add-to-cart-btn {
            padding: 12px 30px;
            background: #9614c9;
            color: white;
            border: 3px solid white;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .add-to-cart-btn:hover {
            background: #40E0D0;
            transform: scale(1.05);
        }
        
        /* Блок комментариев */
        .reviews-section {
            border-top: 3px solid #9614c9;
            padding-top: 25px;
        }
        
        .reviews-title {
            font-size: 24px;
            color: #9614c9;
            font-family: Snell Roundhand, cursive;
            margin-bottom: 20px;
        }
        
        .average-rating {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stars {
            color: #ffc107;
            font-size: 24px;
            letter-spacing: 5px;
        }
        
        .rating-value {
            font-size: 20px;
            font-weight: bold;
            color: #9614c9;
        }
        
        .review-form {
            background: rgba(255,255,255,0.9);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            border: 2px solid #9614c9;
        }
        
        .review-form h4 {
            margin-bottom: 15px;
            color: #9614c9;
        }
        
        .rating-input {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            gap: 5px;
            margin-bottom: 15px;
        }
        
        .rating-input input {
            display: none;
        }
        
        .rating-input label {
            font-size: 30px;
            color: #ddd;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .rating-input input:checked ~ label,
        .rating-input label:hover,
        .rating-input label:hover ~ label {
            color: #ffc107;
        }
        
        .review-form textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #40E0D0;
            border-radius: 10px;
            resize: vertical;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        
        .review-form textarea:focus {
            outline: none;
            border-color: #9614c9;
        }
        
        .submit-review {
            padding: 10px 25px;
            background: #9614c9;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .submit-review:hover {
            background: #40E0D0;
            transform: scale(1.05);
        }
        
        /* Список комментариев */
        .reviews-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .review-item {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid #9614c9;
            position: relative;
        }
        
        .review-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        
        .review-user {
            font-weight: bold;
            color: #9614c9;
        }
        
        .review-stars {
            color: #ffc107;
        }
        
        .review-date {
            font-size: 12px;
            color: #999;
        }
        
        .review-comment {
            color: #333;
            line-height: 1.4;
        }
        
        .delete-review {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #f44336;
            transition: 0.2s;
        }
        
        .delete-review:hover {
            transform: scale(1.1);
            color: #d32f2f;
        }
        
        .no-reviews {
            text-align: center;
            padding: 30px;
            color: #999;
        }
        
        .already-reviewed {
            background: #f0f0f0;
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            color: #666;
            margin-bottom: 20px;
        }
        .review-item {
            background: white;
            border-radius: 15px;
            padding: 15px;
            padding-right: 50px;
            margin-bottom: 15px;
            border-left: 5px solid #9614c9;
            position: relative;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            flex-wrap: wrap;
            padding-right: 30px;
        }

        .delete-review {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #f44336;
            transition: 0.2s;
            z-index: 1;
        }
        .product-thumbnails img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid white;
            cursor: pointer;
            transition: 0.2s;
        }
        .product-thumbnails img:hover {
            transform: scale(1.05);
            border-color: #9614c9;
        }
        .product-thumbnails {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .product-thumbnails img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid white;
            cursor: pointer;
            transition: 0.2s;
        }
        .product-thumbnails img:hover {
            transform: scale(1.05);
            border-color: #9614c9;
        }
    </style>
</head>
<body>
    <div class="product-page" id="productPage">
        <a href="dashboard.html" class="back-to-catalog">← Назад в каталог</a>
        
        <div class="product-detail" id="productDetail">
            <div class="product-detail-image">
                <img id="productImage" src="" alt="">
                <div class="product-thumbnails" id="productThumbnails"></div>
            </div>
            <div class="product-detail-info">
                <h1 class="product-detail-name" id="productName"></h1>
                <div class="product-detail-price" id="productPrice"></div>
                <div class="product-detail-description" id="productDescription"></div>
                <div class="product-detail-stock" id="productStock"></div>
                <button class="add-to-cart-btn" onclick="addCurrentToCart()">🛒 В корзину</button>
            </div>
        </div>
        
        <div class="reviews-section">
            <div class="reviews-title">Отзывы и оценки</div>
            
            <div class="average-rating" id="averageRating">
                <div class="stars">★★★★★</div>
                <div class="rating-value" id="ratingValue">0.0</div>
            </div>
            
            <!-- Форма добавления отзыва -->
            <div id="reviewFormContainer"></div>
            
            <!-- Список отзывов -->
            <div class="reviews-list" id="reviewsList">
                <div class="no-reviews">Загрузка отзывов...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        let currentProduct = null;
        let currentProductId = null;
        let currentUser = null;
        let hasUserReviewed = false;
        // Загрузить дополнительные фото для галереи
        async function loadProductGallery(productId) {
            const { data, error } = await supabaseClient
                .from('product_images')
                .select('*')
                .eq('product_id', productId)
                .order('display_order');
            
            if (error || !data || data.length === 0) return;
            
            const container = document.getElementById('productThumbnails');
            container.innerHTML = data.map(img => `
                <img src="${img.image_url}" onclick="document.getElementById('productImage').src='${img.image_url}'">
            `).join('');
        }
        // Получить ID товара из URL
        function getProductIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }
        
        // Загрузить товар
        async function loadProduct() {
            const productId = getProductIdFromUrl();
            if (!productId) {
                window.location.href = 'dashboard.html';
                return;
            }
            
            currentProductId = parseInt(productId);
            currentUser = await supabaseClient.auth.getUser();
            
            try {
                const { data, error } = await supabaseClient
                    .from('products')
                    .select('*')
                    .eq('id', currentProductId)
                    .single();
                    
                if (error) throw error;
                
                currentProduct = data;
                displayProduct(data);
                await loadProductGallery(currentProductId);
                await loadProductGallery(currentProductId);
                await loadReviews();
                await checkUserReview();
                
            } catch (error) {
                console.error('Error loading product:', error);
                document.getElementById('productDetail').innerHTML = '<div style="color: red;">Ошибка загрузки товара</div>';
            }
        }
        
        function displayProduct(product) {
            document.getElementById('productName').textContent = product.name;
            document.getElementById('productPrice').textContent = product.price + ' ₽';
            document.getElementById('productDescription').textContent = product.description || 'Описание отсутствует';
            document.getElementById('productStock').textContent = 'В наличии: ' + (product.stock || 0) + ' шт.';
            
            const img = document.getElementById('productImage');
            if (product.image_url) {
                img.src = product.image_url;
                img.onerror = () => { img.src = 'https://via.placeholder.com/250x250?text=Mineral'; };
            } else {
                img.src = 'https://via.placeholder.com/250x250?text=Mineral';
            }
        }
        // Загрузить дополнительные фото для галереи
        async function loadProductGallery(productId) {
            const { data, error } = await supabaseClient
                .from('product_images')
                .select('*')
                .eq('product_id', productId)
                .order('display_order');
            
            if (error || !data || data.length === 0) return;
            
            const container = document.getElementById('productThumbnails');
            container.innerHTML = data.map(img => `
                <img src="${img.image_url}" onclick="document.getElementById('productImage').src='${img.image_url}'">
            `).join('');
        }
        // Добавить текущий товар в корзину
        function addCurrentToCart() {
            if (!currentProduct) return;
            
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const existing = cart.find(item => item.id === currentProduct.id);
            
            if (existing) {
                existing.quantity = (existing.quantity || 1) + 1;
            } else {
                cart.push({ id: currentProduct.id, name: currentProduct.name, price: currentProduct.price, quantity: 1 });
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            showMessagePopup(currentProduct.name + ' добавлен в корзину', 'success');
        }
        
        // Проверить, оставлял ли пользователь уже отзыв
        async function checkUserReview() {
            if (!currentUser?.data?.user) {
                // Не авторизован
                document.getElementById('reviewFormContainer').innerHTML = `
                    <div class="already-reviewed">
                        <a href="vhod.html" style="color: #9614c9;">Войдите</a>, чтобы оставить отзыв
                    </div>
                `;
                return;
            }
            
            try {
                const { data, error } = await supabaseClient
                    .from('product_reviews')
                    .select('id')
                    .eq('product_id', currentProductId)
                    .eq('user_id', currentUser.data.user.id)
                    .maybeSingle();
                    
                if (error) throw error;
                
                hasUserReviewed = !!data;
                
                if (hasUserReviewed) {
                    document.getElementById('reviewFormContainer').innerHTML = `
                        <div class="already-reviewed">
                            ✅ Вы уже оставили отзыв на этот товар. Спасибо!
                        </div>
                    `;
                } else {
                    showReviewForm();
                }
                
            } catch (error) {
                console.error('Error checking user review:', error);
                showReviewForm();
            }
        }
        
        function showReviewForm() {
            document.getElementById('reviewFormContainer').innerHTML = `
                <div class="review-form">
                    <h4>Оставить отзыв</h4>
                    <div class="rating-input">
                        <input type="radio" name="rating" value="5" id="star5"><label for="star5">★</label>
                        <input type="radio" name="rating" value="4" id="star4"><label for="star4">★</label>
                        <input type="radio" name="rating" value="3" id="star3"><label for="star3">★</label>
                        <input type="radio" name="rating" value="2" id="star2"><label for="star2">★</label>
                        <input type="radio" name="rating" value="1" id="star1"><label for="star1">★</label>
                    </div>
                    <textarea id="reviewComment" rows="3" placeholder="Ваш комментарий..."></textarea>
                    <button class="submit-review" onclick="submitReview()">Отправить отзыв</button>
                </div>
            `;
        }
        
        // Загрузить отзывы
        async function loadReviews() {
            try {
                const { data, error } = await supabaseClient
                    .from('product_reviews')
                    .select('*')
                    .eq('product_id', currentProductId)
                    .order('created_at', { ascending: false });
                    
                if (error) throw error;
                
                displayReviews(data || []);
                updateAverageRating(data || []);
                
            } catch (error) {
                console.error('Error loading reviews:', error);
                document.getElementById('reviewsList').innerHTML = '<div class="no-reviews">Ошибка загрузки отзывов</div>';
            }
        }
        
        function displayReviews(reviews) {
            const container = document.getElementById('reviewsList');
            
            if (reviews.length === 0) {
                container.innerHTML = '<div class="no-reviews">Пока нет отзывов. Будьте первым!</div>';
                return;
            }
            
            const isAdmin = currentUser?.data?.user?.email === 'admin@example.com'; // Замени на свою проверку
            
            container.innerHTML = reviews.map(review => {
                const canDelete = (currentUser?.data?.user && review.user_id === currentUser.data.user.id) || isAdmin;
                
                return `
                    <div class="review-item">
                        <div class="review-header">
                            <span class="review-user">${escapeHtml(review.user_email || 'Пользователь')}</span>
                            <span class="review-stars">${'★'.repeat(review.rating)}${'☆'.repeat(5 - review.rating)}</span>
                            <span class="review-date">${new Date(review.created_at).toLocaleDateString()}</span>
                        </div>
                        <div class="review-comment">${escapeHtml(review.comment || 'Без комментария')}</div>
                        ${canDelete ? `<button class="delete-review" onclick="deleteReview(${review.id})">🗑️</button>` : ''}
                    </div>
                `;
            }).join('');
        }
        
        function updateAverageRating(reviews) {
            if (reviews.length === 0) {
                document.getElementById('averageRating').style.display = 'none';
                return;
            }
            
            document.getElementById('averageRating').style.display = 'flex';
            const total = reviews.reduce((sum, r) => sum + r.rating, 0);
            const avg = total / reviews.length;
            
            const fullStars = Math.floor(avg);
            const halfStar = avg % 1 >= 0.5;
            
            let starsHtml = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= fullStars) starsHtml += '★';
                else if (halfStar && i === fullStars + 1) starsHtml += '½';
                else starsHtml += '☆';
            }
            
            document.querySelector('#averageRating .stars').innerHTML = starsHtml;
            document.getElementById('ratingValue').textContent = avg.toFixed(1);
        }
        
        // Отправить отзыв
        async function submitReview() {
            if (!currentUser?.data?.user) {
                showMessagePopup('Войдите в аккаунт, чтобы оставить отзыв', 'error');
                window.location.href = 'vhod.html';
                return;
            }
            
            if (hasUserReviewed) {
                showMessagePopup('Вы уже оставили отзыв на этот товар', 'error');
                return;
            }
            
            const ratingInput = document.querySelector('input[name="rating"]:checked');
            if (!ratingInput) {
                showMessagePopup('Выберите оценку', 'error');
                return;
            }
            
            const rating = parseInt(ratingInput.value);
            const comment = document.getElementById('reviewComment').value.trim();
            
            if (comment.length === 0) {
                showMessagePopup('Напишите комментарий', 'error');
                return;
            }
            
            try {
                const { error } = await supabaseClient
                    .from('product_reviews')
                    .insert([{
                        product_id: currentProductId,
                        user_id: currentUser.data.user.id,
                        user_email: currentUser.data.user.email,
                        rating: rating,
                        comment: comment
                    }]);
                    
                if (error) {
                    if (error.code === '23505') {
                        showMessagePopup('Вы уже оставляли отзыв на этот товар', 'error');
                    } else {
                        throw error;
                    }
                    return;
                }
                
                hasUserReviewed = true;
                await loadReviews();
                await checkUserReview();
                showMessagePopup('Отзыв добавлен! Спасибо!', 'success');
                
            } catch (error) {
                console.error('Error submitting review:', error);
                showMessagePopup('Ошибка при отправке отзыва', 'error');
            }
        }
        
        // Удалить отзыв
        async function deleteReview(reviewId) {
            if (!confirm('Удалить этот отзыв?')) return;
            
            try {
                const { error } = await supabaseClient
                    .from('product_reviews')
                    .delete()
                    .eq('id', reviewId);
                    
                if (error) throw error;
                
                await loadReviews();
                await checkUserReview();
                showMessagePopup('Отзыв удален', 'success');
                
            } catch (error) {
                console.error('Error deleting review:', error);
                showMessagePopup('Ошибка при удалении', 'error');
            }
        }
        
        function showMessagePopup(text, type) {
            const popup = document.createElement('div');
            popup.className = `message-popup ${type}`;
            popup.textContent = text;
            document.body.appendChild(popup);
            setTimeout(() => {
                popup.classList.add('fade-out');
                setTimeout(() => popup.remove(), 300);
            }, 3000);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Запуск
        window.onload = async function() {
            await checkAuth();
            await loadProduct();
        };
    </script>
</body>
</html>
