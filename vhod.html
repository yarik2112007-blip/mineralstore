<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MineralStore - Вход</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="square1 auth-container">
        <!-- Кнопка назад -->
        <img class="imgBack" src="https://cdn-icons-png.flaticon.com/512/93/93634.png" onclick="location.href='index.html'" style="width: 50px; height: 50px; cursor: pointer;">
        
        <!-- Сообщения об ошибках/успехе -->
        <div id="errorMessage" class="error-message" style="display: none;"></div>
        <div id="successMessage" class="success-message" style="display: none;"></div>
        
        <!-- Заголовок -->
        <h2 class="auth-title">Вход</h2>
        
        <!-- Форма входа -->
        <div class="auth-form">
            <div class="input-group">
                <label class="input-label">Почта</label>
                <input type="email" id="loginEmail" class="auth-input" placeholder="Введите email">
            </div>
            
            <div class="input-group">
                <label class="input-label">Пароль</label>
                <input type="password" id="loginPassword" class="auth-input" placeholder="Введите пароль">
            </div>
            
            <button id="loginBtn" class="auth-button">
                Войти
            </button>
            
            <div class="auth-footer">
                Нет аккаунта? 
                <a href="registrat.html" class="auth-link">Зарегистрироваться</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginBtn').addEventListener('click', async function() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            await login(email, password);
        });
    </script>
</body>
</html>
